changelog:
  exclude:
    labels:
      - skip-changelog
      - ignore-for-release
      - duplicate
      - invalid
      - question
      - wontfix
  categories:
    - title: Breaking Changes
      labels:
        - breaking-change
        - breaking
    - title: Features
      labels:
        - feature
        - enhancement
    - title: Bug Fixes
      labels:
        - bug
        - fix
    - title: Documentation
      labels:
        - documentation
        - docs
    - title: Maintenance
      labels:
        - chore
        - refactor
        - ci
        - dependencies
    - title: Other Changes
      labels:
        - "*"
