# Air - Go hot reload for `make ui-dev` and devcontainer `ui`.

root = "."
tmp_dir = "tmp"

[build]
  entrypoint = "./cmd/asset-studio"
  cmd = "go build -o ./tmp/asset-studio ./cmd/asset-studio"
  full_bin = "${ASSET_STUDIO_UI_EXEC_PREFIX}./tmp/asset-studio ui --no-open --host ${ASSET_STUDIO_UI_HOST:-localhost} ${ASSET_STUDIO_UI_FLAGS}"
  delay = 1000
  kill_delay = 500
  send_interrupt = true
  include_ext = ["go"]
  include_dir = ["cmd", "internal"]
  exclude_dir = ["ui", "tests", "scripts", "docker", "tmp", ".devcontainer", ".github"]
  exclude_regex = ["_test\\.go$"]
  log = "build-errors.log"

[log]
  main_only = true

[misc]
  clean_on_exit = true
