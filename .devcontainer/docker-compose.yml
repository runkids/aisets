name: aisets_devcontainer_wt

services:
  aisets-devcontainer:
    build:
      context: ..
      dockerfile: docker/sandbox/Dockerfile
    working_dir: /workspace
    command: sleep infinity
    environment:
      HOME: /home/developer
      GOCACHE: /go/build-cache
      AISETS_UI_HOST: 0.0.0.0
      AISETS_UI_PORT: "5175"
      AISETS_PORT: "19521"
      AISETS_LLM_ENDPOINT: http://host.docker.internal:11434
    ports:
      - "5175:5175"
      - "19521:19521"
    volumes:
      - ..:/workspace
      - wt-ui-node-modules:/workspace/ui/node_modules
      - wt-go-mod-cache:/go/pkg/mod
      - wt-go-build-cache:/go/build-cache
      - wt-dev-home:/home/developer
    security_opt:
      - no-new-privileges:true

volumes:
  wt-go-mod-cache:
  wt-go-build-cache:
  wt-dev-home:
  wt-ui-node-modules:
